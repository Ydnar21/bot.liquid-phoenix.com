steps:
  # Step 1: Build the container image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/bot-liquid-phoenix-com:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/bot-liquid-phoenix-com:latest', '.']

  # Step 2: Push the images to the Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bot-liquid-phoenix-com:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bot-liquid-phoenix-com:latest']

  # Step 3: Deploy the container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'bot-liquid-phoenix-com'
      - '--image'
      - 'gcr.io/$PROJECT_ID/bot-liquid-phoenix-com:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/bot-liquid-phoenix-com:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/bot-liquid-phoenix-com:latest'

options:
  logging: CLOUD_LOGGING_ONLY
